name: barberpro
description: Sistema de Gestión para Barbería - BarberPro
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Icono de la aplicación (puedes cambiarlo después)
  assets:
    - assets/
  
  # Opcional: Nombre mostrado en el launcher
  android:
    package: com.barberpro.app
  ios:
    bundleIdentifier: com.barberpro.app
