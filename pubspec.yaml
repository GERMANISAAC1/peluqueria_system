name: kety_barber_salon
description: Sistema profesional de gestión para peluquería con Supabase
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  http: ^1.1.0
  network_info_plus: ^4.1.0
  ping_discover_network: ^0.4.0
  flutter:
    sdk: flutter

  # ── Base de datos y backend ──
  supabase_flutter: ^2.3.4

  # ── Hash de contraseñas ──
  crypto: ^3.0.3

  # ── Códigos QR ──
  qr_flutter: ^4.1.0          # Generar QR
  mobile_scanner: ^5.1.0      # Escanear QR real con cámara

  # ── Utilidades ──
  intl: ^0.19.0     
  image_picker: ^1.1.2
  # Formateo de fechas

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true



  
